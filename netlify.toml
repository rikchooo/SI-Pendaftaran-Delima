[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self' https://si-pendaftaran-delima-backend-production.up.railway.app; style-src 'self' 'unsafe-inline' https://www.gstatic.com https://fonts.googleapis.com; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.gstatic.com https://maps.googleapis.com https://www.google.com; img-src 'self' data: https: blob: https://www.gstatic.com https://maps.googleapis.com https://maps.gstatic.com; connect-src 'self' https://si-pendaftaran-delima-backend-production.up.railway.app https://api.cloudinary.com https://res.cloudinary.com; frame-src 'self' https://www.google.com https://maps.google.com; font-src 'self' data:;"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/favicon.ico"
  to = "/icons/LogoPonPes.png"
  status = 200
  force = true
